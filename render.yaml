services:
  - type: web
    name: flashcard-api
    env: node
    plan: free
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DB_HOST
        fromDatabase:
          name: flashcard-db
          property: host
      - key: DB_USER
        fromDatabase:
          name: flashcard-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: flashcard-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: flashcard-db
          property: dbname
      - key: CORS_ORIGIN
        value: https://ibnjal.com.br
